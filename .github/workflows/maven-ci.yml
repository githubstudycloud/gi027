name: Java Maven CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x springboot4-enterprise-framework/mvnw

      - name: Run Maven tests
        run: ./springboot4-enterprise-framework/mvnw -f springboot4-enterprise-framework/pom.xml clean test
